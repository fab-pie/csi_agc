# ZoeFall TX - production configuration
# Flash with: flash zoefall RX-XXXX:COMXX TX-XXXX:COMXX
# IMPORTANT: RX must come FIRST (product.py defines [zoefall_rx, zoefall_tx])
# SSID and TB token are overwritten automatically by inject.py at flash time.
# Edit only: CONFIG_ZC_ZF_WIFI_AP_PASSWORD, CONFIG_ZC_ZF_TX_UPSTREAM_SSID/PASSWORD

# Common - ESP-IDF task stack depths
CONFIG_ZC_ZF_SEND_REPORT_TASK_STACK_DEPTH=5000
CONFIG_ZC_ZF_REPORT_STATUS_TASK_STACK_DEPTH=5000

# Common - Wi-Fi AP (must match RX config)
CONFIG_ZC_ZF_WIFI_AP_SSID="ZoeFallXXXX"
CONFIG_ZC_ZF_WIFI_AP_PASSWORD="12345678"

# Common - timing
CONFIG_ZC_ZF_WIFI_RECONNECT_DELAY=30
CONFIG_ZC_ZF_REPORT_STATUS_DELAY=60
CONFIG_ZC_ZF_CSI_RATE=100

# TX - ESP-IDF task stack depths
CONFIG_ZC_ZF_TX_UDP_TASK_STACK_DEPTH=3000

# TX - ThingsBoard access token (overwritten by inject.py)
CONFIG_ZC_ZF_TX_TB_ACCESS_TOKEN=""

# TX - upstream Wi-Fi (set manually per site)
CONFIG_ZC_ZF_TX_UPSTREAM_SSID=""
CONFIG_ZC_ZF_TX_UPSTREAM_PASSWORD=""
