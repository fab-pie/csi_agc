# SSID and TB token are overwritten automatically by inject.py at flash time.
# Edit only: CONFIG_ZC_ZF_WIFI_AP_PASSWORD, CONFIG_ZC_ZF_REPORT_STATUS_DELAY, CONFIG_ZC_ZF_RX_SENSOR_ID

# Common - Wi-Fi AP (must match TX config)
